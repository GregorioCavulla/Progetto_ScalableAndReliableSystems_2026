apiVersion: apps/v1
kind: Deployment
metadata:
  name: drone-simulator
spec:
  replicas: 3
  selector:
    matchLabels:
      app: drone-simulator
  template:
    metadata:
      labels:
        app: drone-simulator
    spec:
      containers:
      - name: drone
        image: progetto-final-image:latest
        imagePullPolicy: IfNotPresent
        command: ["python3", "-u", "drone_simulator.py"]
        env:
        - name: MQTT_BROKER
          value: "mosquitto-service"
        - name: MQTT_PORT
          value: "1883"
        - name: DRONE_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 150m
            memory: 128Mi
