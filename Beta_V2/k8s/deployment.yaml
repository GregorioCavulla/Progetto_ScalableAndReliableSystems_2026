apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-remediation-deployment
  labels:
    app: mcp-remediation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-remediation
  template:
    metadata:
      labels:
        app: mcp-remediation
    spec:
      containers:
      - name: mcp-remediation
        image: mcp-remediation:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: BROKER_HOST
          value: custom-broker
        - name: BROKER_PORT
          value: "80"
        - name: MCP_MAX_DRONE_DELTA
          value: "5"
        - name: MCP_MAX_ACTIONS_PER_INCIDENT
          value: "5"
        - name: MCP_MAX_ESTIMATED_COST_DELTA
          value: "250"
        - name: MCP_MAX_APPROVAL_TTL_SECONDS
          value: "900"
        command: ["python", "mcp_remediation.py"]
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
