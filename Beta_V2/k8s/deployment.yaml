apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-streamer-deployment
  labels:
    app: order-streamer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-streamer
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: order-streamer
    spec:
      containers:
      - name: order-streamer
        image: order-streamer:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: BROKER_HOST
          value: custom-broker
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
---
