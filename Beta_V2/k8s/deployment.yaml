apiVersion: apps/v1
kind: Deployment
metadata:
  name: custom-broker-deployment
  labels:
    app: custom-broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: custom-broker
  template:
    metadata:
      labels:
        app: custom-broker
    spec:
      containers:
      - name: custom-broker
        image: custom-broker:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 30
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "300m"
            memory: "128Mi"
---
